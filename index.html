        if(!soundEnabled) return;

        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();

        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function saveToFirebase() {
        if (!window.fb) { console.warn("[FB SAVE] Firebase not ready"); return; }
        if (!currentUser || currentUser.role === 'viewer') { console.warn("[FB SAVE] Viewer mode, skip save"); return; }
        
        const data = {
            players: PLAYERS,
            matrix: matrix,
            dates: dates.map(d => d.getTime()),
            dateNotes: dateNotes,
            photos: datePhotos,
            comments: statusComments,
            playerComments: playerComments,
            lastUpdated: Date.now()
        };
        
        console.log("[FB SAVE] Attempting to save data for group:", currentGroup);
        window.fb.set(window.fb.ref(window.fb.db, `groups/${currentGroup}`), data)
            .then(() => console.log("[FB SAVE] SUCCESS! Data synced."))
            .catch(err => console.error("[FB SAVE] FAILED!", err));
    }

    function loadFromFirebase() {
        if (!window.fb) { console.warn("[FB LOAD] Firebase not ready"); return; }
        
        if (fbUnsubscribe) {
            console.log("[FB LOAD] Unsubscribing from previous listener");
            fbUnsubscribe();
        }

        console.log("[FB LOAD] Subscribing to group:", currentGroup);
        const groupRef = window.fb.ref(window.fb.db, `groups/${currentGroup}`);
        fbUnsubscribe = window.fb.onValue(groupRef, (snapshot) => {
            const data = snapshot.val();
            console.log("[FB LOAD] Received data:", data ? "YES (" + Object.keys(data).length + " keys)" : "NULL");
            
            if (data) {
                PLAYERS = data.players || [];
                matrix = data.matrix || [];
                dates = (data.dates || []).map(t => new Date(t));
                dateNotes = data.dateNotes || {};
                datePhotos = data.photos || {};
                statusComments = data.comments || {};
                playerComments = data.playerComments || {};
                
                if(groups[currentGroup]) {
                    groups[currentGroup].players = PLAYERS;
                    groups[currentGroup].matrix = matrix;
                    groups[currentGroup].dates = dates;
                    groups[currentGroup].dateNotes = dateNotes;
                    groups[currentGroup].photos = datePhotos;
                    groups[currentGroup].comments = statusComments;
                    groups[currentGroup].playerComments = playerComments;
                }
                
                console.log("[FB LOAD] Updating UI with", PLAYERS.length, "players and", dates.length, "dates");
                renderTable();
                renderCalendar();
                renderGroupsBar();
            } else {
                console.warn("[FB LOAD] No data found in Firebase for this group!");
            }
        }, (error) => {
            console.error("[FB LOAD] LISTENER ERROR:", error);
            showToast("Ошибка подключения к базе: " + error.message, "ОШИБКА");
        });
    }

    async function migrateLocalStorageToFirebase() {
        const localData = localStorage.getItem('error_journal_groups');
        if (localData && window.fb && currentUser && currentUser.role !== 'viewer') {
            try {
                console.log("[MIGRATE] Checking for local data migration...");
                const parsed = JSON.parse(localData);
                if (parsed && parsed.default) {
                    const existing = await window.fb.get(window.fb.ref(window.fb.db, 'groups/default'));
                    if (!existing.val()) {
                        console.log("[MIGRATE] Local data found, pushing to Firebase...");
                        const g = parsed.default;
                        const data = {
                            players: g.players || [],
                            matrix: g.matrix || [],
                            dates: (g.dates || []).map(d => new Date(d).getTime()),
                            dateNotes: g.dateNotes || {},
                            photos: g.photos || {},
                            comments: g.comments || {},
                            playerComments: g.playerComments || {},
                            lastUpdated: Date.now()
                        };
                        await window.fb.set(window.fb.ref(window.fb.db, 'groups/default'), data);
                        console.log("[MIGRATE] SUCCESS! Local data migrated.");
                        showToast('Локальные данные перенесены в облако', 'УСПЕШНО');
                        playSuccessSound();
                    } else {
                        console.log("[MIGRATE] Firebase already has data, skipping migration.");
                    }
                }
            } catch (e) {
                console.error('[MIGRATE] Error:', e);
            }
        }
    }

    function exportPDF() {
        try {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
            const pageWidth = doc.internal.pageSize.getWidth();
            const groupName = groups[currentGroup].name;
            const exportDate = new Date().toLocaleString('ru');
            function translit(text) {
                const map = {'А':'A','Б':'B','В':'V','Г':'G','Д':'D','Е':'E','Ё':'YO','Ж':'ZH','З':'Z','И':'I','Й':'Y','К':'K','Л':'L','М':'M','Н':'N','О':'O','П':'P','Р':'R','С':'S','Т':'T','У':'U','Ф':'F','Х':'H','Ц':'TS','Ч':'CH','Ш':'SH','Щ':'SCH','Ъ':'','Ы':'Y','Ь':'','Э':'E','Ю':'YU','Я':'YA','а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'yo','ж':'zh','з':'z','и':'i','й':'y','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r','с':'s','т':'t','у':'u','ф':'f','х':'h','ц':'ts','ч':'ch','ш':'sh','щ':'sch','ъ':'','ы':'y','ь':'','э':'e','ю':'yu','я':'ya'};
                return text.split('').map(c => map[c] !== undefined ? map[c] : c).join('');
            }
            doc.setFont('helvetica');
            doc.setFillColor(10, 10, 10); doc.rect(0, 0, pageWidth, 25, 'F');
            doc.setTextColor(255, 26, 26); doc.setFontSize(18); doc.setFont('helvetica', 'bold');
            doc.text('[CORD] CORDIS DIE', 14, 12);
            doc.setTextColor(0, 255, 255); doc.setFontSize(10);
            doc.text(translit(`Gruppa: ${groupName} | Export: ${exportDate}`), 14, 19);
            const headers = ['IGROK', ...dates.map(d => formatDate(d) + '\n' + translit(WEEKDAYS[d.getDay()]))];
            const rows = PLAYERS.map((player, i) => {
                const row = [player];
                dates.forEach((_, j) => { const status = matrix[i]?.[j] || 'dash'; row.push(translit(STATUS_MAP[status].display)); });
                return row;
            });
            doc.autoTable({
                head: [headers], body: rows, startY: 30, theme: 'grid',
                styles: { font: 'helvetica', fontSize: 7, cellPadding: 2, halign: 'center', valign: 'middle', lineColor: [51, 51, 51], lineWidth: 0.2, textColor: [204, 204, 204] },
                headStyles: { fillColor: [26, 26, 26], textColor: [0, 255, 255], fontStyle: 'bold', fontSize: 7, halign: 'center' },
                columnStyles: { 0: { cellWidth: 40, halign: 'left', textColor: [255, 204, 0], fontStyle: 'bold' } },
                didParseCell: function(data) {
                    if(data.column.index === 0 && data.section === 'body') data.cell.styles.fillColor = [26, 26, 26];
                    if(data.section === 'body' && data.column.index > 0) {
                        const value = data.cell.raw;
                        if(value === 'BYL') { data.cell.styles.fillColor = [0, 51, 0]; data.cell.styles.textColor = [0, 255, 0]; }
                        else if(value === 'NE BYL') { data.cell.styles.fillColor = [51, 0, 0]; data.cell.styles.textColor = [255, 0, 0]; }
                        else if(value === 'OTPUSK') { data.cell.styles.fillColor = [26, 0, 51]; data.cell.styles.textColor = [153, 0, 255]; }
                        else if(value === 'OTPIS+') { data.cell.styles.fillColor = [51, 34, 0]; data.cell.styles.textColor = [255, 204, 0]; }
                        else if(value === 'OTPIS-') { data.cell.styles.fillColor = [51, 51, 51]; data.cell.styles.textColor = [153, 153, 153]; }
                        else { data.cell.styles.fillColor = [26, 26, 26]; data.cell.styles.textColor = [102, 102, 102]; }
                    }
                }, margin: { left: 10, right: 10 }
            });
            const pageCount = doc.internal.getNumberOfPages();
            for(let i = 1; i <= pageCount; i++) {
                doc.setPage(i); doc.setFontSize(7); doc.setTextColor(136, 136, 136);
                doc.text(translit(`Stranica ${i} iz ${pageCount}`), pageWidth - 25, doc.internal.pageSize.getHeight() - 5);
            }
            doc.save(`CORDIS_DIE_${groupName}_${new Date().toISOString().slice(0,10)}.pdf`);
            showToast('PDF eksportirovan', 'PDF'); playSuccessSound(); addLog('EXPORT_PDF', groupName);
        } catch(err) { showToast('Oshibka PDF: ' + err.message, 'ОШИБКА'); playErrorSound(); }
    }

    function importFromCSV(file) {
        const reader=new FileReader();
        reader.onload=(e)=>{
            try {
                const text=e.target.result; const lines=text.split('\n').filter(l=>l.trim());
                if(lines.length<2) { showToast('Файл пуст','ОШИБКА'); playErrorSound(); return; }
                const headers=lines[0].split(';'); const newDates=[];
                for(let i=1;i<headers.length;i++) { const parts=headers[i].trim().split('.'); if(parts.length===2) { const d=new Date(); d.setDate(parseInt(parts[0])); d.setMonth(parseInt(parts[1])-1); d.setHours(0,0,0,0); newDates.push(d); } }
                if(newDates.length===0) { showToast('Не найдены даты','ОШИБКА'); playErrorSound(); return; }
                const newPlayers=[]; const newMatrix=[];
                for(let i=1;i<lines.length;i++) { const cols=lines[i].split(';'); if(cols.length<2) continue; const name=cols[0].trim(); if(!name) continue; newPlayers.push(name); const row=[]; for(let j=1;j<=newDates.length;j++) { const val=(cols[j]||'').trim().toLowerCase(); if(val.includes('был')||val==='✅') row.push('yes_was'); else if(val.includes('не был')||val==='❌') row.push('no_was'); else if(val.includes('отп')&&!val.includes('не отп')) row.push('vacation'); else if(val.includes('отпис')||val==='📢') row.push('yes_reported'); else if(val.includes('не отпис')||val==='🔇') row.push('no_notreported'); else row.push('dash'); } newMatrix.push(row); }
                if(newPlayers.length===0) { showToast('Не найдены игроки','ОШИБКА'); playErrorSound(); return; }
                PLAYERS=newPlayers; dates=newDates; matrix=newMatrix; saveCurrentGroup(); renderTable(); renderCalendar(); renderGroupsBar(); renderFilters(); showToast(`Импортировано: ${PLAYERS.length} игроков, ${dates.length} дней`,'ИМПОРТ'); playSuccessSound(); addLog('ИМПОРТ_CSV',`${PLAYERS.length} игроков`);
            } catch(err) { showToast('Ошибка чтения файла','ОШИБКА'); playErrorSound(); }
        };
        reader.readAsText(file,'UTF-8');
    }

    function importFullDB(file) {

    function typeWriterEffect(element, text, speed = 40) {
        element.textContent = '';
        let i = 0;
        function type() {
            if (i < text.length) {
                element.textContent += text.charAt(i);
                i++;
                setTimeout(type, speed);
            }
        }
        type();
    }

    function scrollToLastDate() {
        const container = document.querySelector('.virtual-scroll-container');
        if(!container || window._manualScrolled) return;
        const todayHeader = document.querySelector('.today-column');
        if(todayHeader) {
            setTimeout(() => {
                const containerRect = container.getBoundingClientRect();
                const headerRect = todayHeader.getBoundingClientRect();
                const offset = headerRect.left - containerRect.left - containerRect.width / 2 + todayHeader.offsetWidth / 2;
                container.scrollLeft = Math.max(0, offset);
            }, 50);
        } else if(dates.length > 0) {
            setTimeout(() => { container.scrollLeft = container.scrollWidth; }, 50);
        }
    }
    function bindTableEvents() {
        document.querySelectorAll('.memory-dump-table td:not(:first-child)').forEach(c=>c.onclick=(e)=>handleCellClick(e,c)); 
        document.querySelectorAll('#tableHead th[data-date-idx]').forEach((h,i)=>{
            h.onmousedown=(e)=>{ if(e.shiftKey) e.preventDefault(); };
            h.onclick=(e)=>{
                if(e.shiftKey) {
                    e.preventDefault();
                    if(selectedDays.has(i)) selectedDays.delete(i);
                    else selectedDays.add(i);
                    renderTable();
                    if(selectedDays.size > 0) showDaysMenu(e);
                    playClickSound();
                } else {
                    showDateMenu(e,dates[i],i,true);
                }
            };
        }); 
        document.querySelectorAll('.date-photo-attach').forEach(el=>{ el.onclick=(e)=>{ e.stopPropagation(); playClickSound(); showPhotoGallery(el.dataset.dateKey); }; }); 
        document.querySelectorAll('.delete-player-btn').forEach(btn=>{ btn.onclick=(e)=>{ e.stopPropagation(); deletePlayer(parseInt(btn.dataset.playerIndex)); }; }); 
        document.querySelectorAll('.comment-indicator').forEach(el => {
            el.onclick = (e) => { e.stopPropagation(); showCommentModal(el.dataset.player, el.dataset.dateKey); };
        });
        document.querySelectorAll('.memory-dump-table tbody tr').forEach(row => {
            row.addEventListener('dragstart', (e) => {
                row.classList.add('dragging');
                e.dataTransfer.setData('text/plain', row.dataset.playerIdx);
                e.dataTransfer.effectAllowed = 'move';
            });
            row.addEventListener('dragend', () => {
                row.classList.remove('dragging');
                document.querySelectorAll('.drag-over').forEach(r => r.classList.remove('drag-over'));
            });
            row.addEventListener('dragover', (e) => {
                e.preventDefault();
                const dragging = document.querySelector('.dragging');
                if(dragging && dragging !== row) row.classList.add('drag-over');
            });
            row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
            row.addEventListener('drop', (e) => {
                e.preventDefault();
                row.classList.remove('drag-over');
                const fromIdx = parseInt(e.dataTransfer.getData('text/plain'));
                const toIdx = parseInt(row.dataset.playerIdx);
                if(fromIdx !== toIdx && !isNaN(fromIdx) && !isNaN(toIdx)) {
                    const [player] = PLAYERS.splice(fromIdx, 1);
                    const [row_matrix] = matrix.splice(fromIdx, 1);
                    PLAYERS.splice(toIdx, 0, player);
                    matrix.splice(toIdx, 0, row_matrix);
                    saveCurrentGroup();
                    renderTable();
                    showToast(`Игрок перемещён`,'УСПЕШНО');
                    playSuccessSound();
                    addLog('ИГРОК_ПЕРЕМЕЩЁН', `${player}`);
                }
            });
        });
        const container = document.querySelector('.virtual-scroll-container');
        if(container && !container._scrollListenerAdded) {
            container.addEventListener('scroll', () => { window._manualScrolled = true; });
            container._scrollListenerAdded = true;
        }
    }

    function renderCalendar() { 
        const cal=document.getElementById('calendarContent'); if(!cal) return; 
        const year=calendarDisplayYear,month=calendarDisplayMonth; 
        const firstDay=new Date(year,month,1); const lastDay=new Date(year,month+1,0); const startDay=firstDay.getDay()||7; 
        let html=`<div class="calendar-header"><button class="error-btn" id="prevMonthBtn"><i class="fa-solid fa-chevron-left"></i></button><span style="color:var(--glitch-cyan);font-size:18px;text-transform:uppercase;">${new Date(year,month).toLocaleString('ru',{month:'long',year:'numeric'})}</span><button class="error-btn" id="nextMonthBtn"><i class="fa-solid fa-chevron-right"></i></button></div><div class="calendar-grid">`; 
        ['ПН','ВТ','СР','ЧТ','ПТ','СБ','ВС'].forEach(d=>html+=`<div style="color:var(--glitch-cyan);padding:10px;text-align:center;">${d}</div>`); 
        for(let i=1;i<startDay;i++) html+=`<div></div>`; 
        for(let d=1;d<=lastDay.getDate();d++) { 
            const date=new Date(year,month,d); const key=getDateKey(date); const note=dateNotes[key]; const noteType=getNoteType(note); const photos=datePhotos[key]||[]; const isTodayDate=isToday(date); 
            let classes='calendar-day'; if(isTodayDate) classes+=' today'; 
            html+=`<div class="${classes}" data-date="${date.toISOString()}">${d}${noteType?`<span class="event-label ${noteType}">${noteType==='tr'?'ТР':'ПТ'}</span>`:''}${photos.length>0?`<span class="calendar-photo-attach"><i class="fa-solid fa-paperclip"></i>${photos.length}</span>`:''}</div>`; 
        } 
        html+=`</div>`; 
        const events = Object.entries(dateNotes).filter(([k,v])=>getNoteType(v)).sort((a,b)=>getEventTimestamp(a[1],a[0])-getEventTimestamp(b[1],b[0])); 
        if(events.length>0) { 
            const now = new Date().getTime();
            const nextEvent = events.find(([k,v])=>getEventTimestamp(v,k) >= now); 
            if(nextEvent) { 
                const eventTs = getEventTimestamp(nextEvent[1], nextEvent[0]);
                const diff = eventTs - now; 
                if(diff>0) {
                    const days=Math.floor(diff/(1000*60*60*24)); 
                    const hours=Math.floor((diff%(1000*60*60*24))/(1000*60*60)); 
                    const minutes=Math.floor((diff%(1000*60*60))/(1000*60));
                    const type=getNoteType(nextEvent[1]); 
                    const typeLabel=type==='tr'?'ТР':'ПТ';
                    const icon=type==='tr'?'fa-trophy':'fa-hand-fist';
                    html=`<div class="countdown-container"><div class="countdown-label"><i class="fa-solid ${icon}"></i> ДО ${typeLabel}:</div><div class="countdown-timer">${days}д ${hours}ч ${minutes}м</div></div>`+html; 
                }
            } 
        } 
        cal.innerHTML=html; 
        document.getElementById('prevMonthBtn').onclick=()=>{if(month===0){calendarDisplayMonth=11;calendarDisplayYear--;}else calendarDisplayMonth--;renderCalendar();playClickSound();}; 
        document.getElementById('nextMonthBtn').onclick=()=>{if(month===11){calendarDisplayMonth=0;calendarDisplayYear++;}else calendarDisplayMonth++;renderCalendar();playClickSound();};

    function checkEventAlerts() {
        const now = new Date().getTime();
        const events = Object.entries(dateNotes).filter(([k,v])=>getNoteType(v));
        events.forEach(([key, note]) => {
            const eventTs = getEventTimestamp(note, key);
            const diff = eventTs - now;
            const type = getNoteType(note);
            const typeLabel = type === 'tr' ? 'ТР' : 'ПТ';
            const formattedDate = formatDateFromKey(key);
            const alertKey = `${key}_${type}`;
            if(diff > 23*60*60*1000 && diff < 25*60*60*1000 && !lastAlertedEvents.has(alertKey+'_day')) {
                showToast(`Завтра ${typeLabel} (${formattedDate})!`, 'ПРЕДУПРЕЖДЕНИЕ');
                playAlertSound();
                lastAlertedEvents.add(alertKey+'_day');
            }
            if(diff > 55*60*1000 && diff < 65*60*1000 && !lastAlertedEvents.has(alertKey+'_hour')) {
                showToast(`Через час ${typeLabel} (${formattedDate})!`, 'НАПОМИНАНИЕ');
                playAlertSound();
                setTimeout(() => playAlertSound(), 1000);
                setTimeout(() => playAlertSound(), 2000);
                lastAlertedEvents.add(alertKey+'_hour');
            }
        });
    }
    const ORIGINAL_TITLE = '[CORD] CORDIS DIE';
    const GLITCH_CHARS = '!<>-_\\/[]{}—=+*^?#_0123456789';
    let decodeInterval = null;
    let isDecoding = false;
    function triggerDecodeEffect() {
        const title = document.getElementById('mainTitle');
        if(!title || isDecoding) return;
        isDecoding = true;
        title.classList.add('decoding');
        let iteration = 0;
        if(decodeInterval) clearInterval(decodeInterval);
        decodeInterval = setInterval(() => {
            title.textContent = ORIGINAL_TITLE.split('').map((char, i) => {
                if(char === ' ' || char === '[' || char === ']') return char;
                if(i < iteration) return ORIGINAL_TITLE[i];
                return GLITCH_CHARS[Math.floor(Math.random() * GLITCH_CHARS.length)];
            }).join('');
            iteration += 0.5;
            if(iteration >= ORIGINAL_TITLE.length) {
                clearInterval(decodeInterval);
                decodeInterval = null;
                title.textContent = ORIGINAL_TITLE;
                setTimeout(() => {
                    title.classList.remove('decoding');
                    isDecoding = false;
                }, 300);
            }
        }, 40);
    }

        const app=document.getElementById('app'); 
        const isAdmin=currentUser.role==='admin',isViewer=currentUser.role==='viewer'; 
        app.innerHTML=`<div class="app-container"><div class="tabs-container"><button class="tab-terminal active" data-tab="journal"><i class="fa-solid fa-book"></i> ЖУРНАЛ</button><button class="tab-terminal" data-tab="calendar"><i class="fa-solid fa-calendar-days"></i> КАЛЕНДАРЬ</button>${isAdmin?'<button class="tab-terminal" data-tab="admin"><i class="fa-solid fa-user-shield"></i> УПРАВЛЕНИЕ</button>':''}<button class="tab-terminal" data-tab="history"><i class="fa-solid fa-clock-rotate-left"></i> ИСТОРИЯ</button></div><div class="terminal-card"><div class="error-header"><h1><span class="decode-title" id="mainTitle">${ORIGINAL_TITLE}</span></h1><div class="header-right"><div class="stats-terminal"><div class="stat-block"><span class="stat-label"><i class="fa-solid fa-users"></i> ИГРОКИ</span><span class="stat-value">${PLAYERS.length}</span></div><div class="stat-block"><span class="stat-label"><i class="fa-solid fa-calendar"></i> ДНИ</span><span class="stat-value">${dates.length}</span></div><div class="stat-block"><span class="stat-label"><i class="fa-solid fa-layer-group"></i> ГРУППА</span><span class="stat-value">${groups[currentGroup].name}</span></div></div><div class="header-time" id="sysTime" title="Нажмите для мини-календаря">${formatDateTime()}</div><div style="display:flex;gap:10px;"><button class="error-btn" id="soundToggle">${soundEnabled?'<i class="fa-solid fa-volume-high"></i>':'<i class="fa-solid fa-volume-xmark"></i>'}</button><button class="error-btn" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> ВЫХОД</button></div></div></div><div id="groupsBar" class="groups-bar"></div><div id="filtersBar" class="filters-bar"></div><input type="file" id="fileInput" class="file-input" accept=".csv"><div id="journalTab" class="tab-content">${!isViewer?`<div style="padding:20px;display:flex;gap:15px;flex-wrap:wrap;border-bottom:1px solid var(--border-dim);"><div class="input-wrapper"><input type="text" id="newPlayerName" class="terminal-input" placeholder="ИМЯ ИГРОКА"></div><button class="error-btn" id="addPlayerBtn"><i class="fa-solid fa-user-plus"></i> ДОБАВИТЬ</button><button class="error-btn" id="addDayBtn"><i class="fa-solid fa-calendar-plus"></i> +ДЕНЬ</button><span style="color:var(--text-muted);font-size:11px;display:flex;align-items:center;gap:5px;"><i class="fa-solid fa-info-circle"></i> Перетащи игрока • Shift+клик на дату</span></div>`:''}<div style="padding:20px;display:flex;gap:15px;flex-wrap:wrap;border-bottom:1px solid var(--border-dim);"><div class="input-wrapper"><input type="text" id="searchInput" class="terminal-input" placeholder="ПОИСК"></div><button class="error-btn" id="searchBtn"><i class="fa-solid fa-magnifying-glass"></i> ПОИСК</button><button class="error-btn" id="clearSearchBtn"><i class="fa-solid fa-eraser"></i> ОЧИСТИТЬ</button></div><div class="virtual-scroll-container"><table class="memory-dump-table" id="diaryTable"><thead id="tableHead"></thead><tbody id="tableBody"></tbody></table></div><div style="padding:20px;border-top:1px solid var(--border-dim);display:flex;gap:15px;flex-wrap:wrap;">${Object.entries(STATUS_MAP).map(([k,v])=>`<div style="display:flex;align-items:center;gap:8px;"><span class="status-${v.class}" style="padding:5px 10px;display:flex;align-items:center;gap:5px;"><i class="fa-solid ${v.icon}" style="color:${v.color};"></i> ${v.display}</span><span style="color:var(--text-muted);font-size:12px;">${v.full}</span></div>`).join('')}</div></div><div id="calendarTab" class="tab-content hidden"><div id="calendarContent" class="calendar-container"></div></div>${isAdmin?'<div id="adminTab" class="tab-content hidden"><div id="adminContent" style="padding:20px;"></div></div>':''}</div></div><div class="notes-button" id="notesToggle"><i class="fa-solid fa-comment"></i></div><div class="notes-panel" id="notesPanel"><textarea class="notes-textarea" id="globalNotes" placeholder="Заметки куратора...">${globalNotes}</textarea><button class="error-btn" id="saveNotesBtn" style="width:100%;"><i class="fa-solid fa-floppy-disk"></i> СОХРАНИТЬ</button></div>`; 
        
        document.getElementById('sysTime').onclick = showMiniCalendar;

        renderGroupsBar(); 
        renderFilters();
        renderTable(); 
        renderCalendar(); 
        generateErrorBackground();
        
        setTimeout(triggerDecodeEffect, 500);
        if(window._decodeTimer) clearInterval(window._decodeTimer);
        window._decodeTimer = setInterval(triggerDecodeEffect, 8000);
        
        document.getElementById('notesToggle').onclick=()=>{document.getElementById('notesPanel').classList.toggle('show');playClickSound();}; 
        document.getElementById('saveNotesBtn').onclick=()=>{globalNotes=document.getElementById('globalNotes').value;localStorage.setItem('error_global_notes',globalNotes);document.getElementById('notesPanel').classList.remove('show');showToast('Заметки сохранены','УСПЕШНО');playSuccessSound();addLog('ЗАМЕТКИ_СОХРАНЕНЫ','Глобальные заметки');}; 
        document.getElementById('soundToggle').onclick=function(){soundEnabled=!soundEnabled;this.innerHTML=soundEnabled?'<i class="fa-solid fa-volume-high"></i>':'<i class="fa-solid fa-volume-xmark"></i>';localStorage.setItem('error_sound',soundEnabled);if(soundEnabled)initAudio();playClickSound();showToast(soundEnabled?'Звук включён':'Звук выключен','ИНФО');}; 
        document.getElementById('logoutBtn').onclick=()=>{
            if(fbUnsubscribe) fbUnsubscribe();
            localStorage.removeItem('error_journal_user');
            currentUser=null;
            render();
            playClickSound();
        }; 
        document.querySelectorAll('.tab-terminal').forEach(t=>t.onclick=()=>{const tab=t.dataset.tab;if(tab==='history'){playTabSound();showHistory();return;}document.querySelectorAll('.tab-terminal').forEach(x=>x.classList.remove('active'));t.classList.add('active');playTabSound();const j=document.getElementById('journalTab'),c=document.getElementById('calendarTab'),a=document.getElementById('adminTab');j.classList.add('hidden');c.classList.add('hidden');if(a)a.classList.add('hidden');if(tab==='journal'){j.classList.remove('hidden');window._manualScrolled=false;renderTable();}else if(tab==='calendar'){c.classList.remove('hidden');renderCalendar();}else if(tab==='admin'){if(a)a.classList.remove('hidden');renderAdmin();}}); 
        if(!isViewer) { const addPlayer=()=>{const n=document.getElementById('newPlayerName').value.trim();if(n){PLAYERS.push(n);matrix.push(dates.map(()=>'dash'));saveCurrentGroup();renderTable();renderGroupsBar();document.getElementById('newPlayerName').value='';addLog('ИГРОК_ДОБАВЛЕН',n);showToast(`Игрок "${n}" добавлен`,'УСПЕШНО');playSuccessSound();}}; document.getElementById('addPlayerBtn').onclick=addPlayer; document.getElementById('newPlayerName').addEventListener('keydown',(e)=>{if(e.key==='Enter')addPlayer();}); document.getElementById('addDayBtn').onclick=addDay; } 
        document.getElementById('searchBtn').onclick=()=>{searchTerm=document.getElementById('searchInput').value.trim().toLowerCase();renderTable();playClickSound();showToast(searchTerm?`Поиск: "${searchTerm}"`:'Поиск очищен','ИНФО');}; 
        document.getElementById('searchInput').addEventListener('keydown',(e)=>{if(e.key==='Enter')document.getElementById('searchBtn').click();}); 
        document.getElementById('clearSearchBtn').onclick=()=>{document.getElementById('searchInput').value='';searchTerm='';renderTable();playClickSound();showToast('Поиск очищен','ИНФО');}; 
        document.getElementById('fileInput').onchange=(e)=>{if(e.target.files[0])importFromCSV(e.target.files[0]);}; 
        
        document.querySelectorAll('.terminal-input').forEach(input => {
            const wrapper = input.closest('.input-wrapper');
            input.addEventListener('focus', () => { if(wrapper) wrapper.classList.add('focus-within'); });
            input.addEventListener('blur', () => { if(wrapper) wrapper.classList.remove('focus-within'); });
            input.addEventListener('keydown', (e) => {
                if(e.key.length === 1 || e.key === 'Backspace') {
                    playKeySound();
                    input.classList.add('typing');
                    setTimeout(() => input.classList.remove('typing'), 200);
                }
            });
        }); 
        
        setInterval(()=>{const e=document.getElementById('sysTime');if(e)e.innerHTML=formatDateTime();},1000); 
        setInterval(()=>{const calTab=document.getElementById('calendarTab');if(calTab&&!calTab.classList.contains('hidden')){const now=new Date();if(calendarDisplayMonth===now.getMonth()&&calendarDisplayYear===now.getFullYear())renderCalendar();}},60000);
        
        checkEventAlerts();
        setInterval(checkEventAlerts, 60000);
    }

    function render() { 
        const app=document.getElementById('app'); 
        if(!currentUser) { 
            app.innerHTML=`<div class="login-screen"><h2><i class="fa-solid fa-lock"></i> ДОСТУП К ТЕРМИНАЛУ</h2><input type="text" id="loginInput" class="login-input" placeholder="ЛОГИН"><input type="password" id="passwordInput" class="login-input" placeholder="ПАРОЛЬ"><button class="login-btn" id="loginBtn"><i class="fa-solid fa-right-to-bracket"></i> ВОЙТИ</button><button class="guest-btn" id="guestBtn"><i class="fa-solid fa-user-secret"></i> ГОСТЬ</button><div id="loginError" style="color:#ff0000;margin-top:10px;"></div></div>`; 
            document.getElementById('loginBtn').onclick=()=>{initAudio();const l=document.getElementById('loginInput').value,p=document.getElementById('passwordInput').value;const u=users.find(x=>x.login===l&&decode(x.password)===p);if(u){currentUser={...u,password:undefined};localStorage.setItem('error_journal_user',JSON.stringify({id:u.id,login:u.login,role:u.role}));loadData(); showWelcomeScreen(); showToast(`Добро пожаловать, ${u.login}`,'УСПЕШНО');playSuccessSound();addLog('ВХОД_В_СИСТЕМУ',u.login);
                migrateLocalStorageToFirebase();
            }else{document.getElementById('loginError').innerText='[ОШИБКА] ДОСТУП ЗАПРЕЩЕН';playErrorSound();}}; 
            document.getElementById('guestBtn').onclick=()=>{currentUser={role:'viewer',login:'ГОСТЬ'};loadData(); showWelcomeScreen(); showToast('Гостевой режим','ИНФО');playClickSound();}; 
            document.getElementById('loginInput').addEventListener('keydown',(e)=>{if(e.key==='Enter')document.getElementById('loginBtn').click();}); 
            document.getElementById('passwordInput').addEventListener('keydown',(e)=>{if(e.key==='Enter')document.getElementById('loginBtn').click();}); 
            document.querySelectorAll('.login-input').forEach(input => {
                input.addEventListener('keydown', () => {
                    input.classList.add('typing');
                    setTimeout(() => input.classList.remove('typing'), 200);
                });
            });
            return; 
        } 
        renderMainApp();
    }
    function loadUsers() { const s=localStorage.getItem('error_journal_users'); if(s) users=JSON.parse(s); }
    function loadSession() { const s=localStorage.getItem('error_journal_user'); if(s) { const d=JSON.parse(s); const u=users.find(x=>x.id===d.id); if(u) currentUser={...u,password:undefined}; } loadData(); }
    window.addEventListener('storage',(e)=>{if(e.key==='error_journal_log'){try{actionLog=JSON.parse(e.newValue||'[]');}catch(e){}}});
    loadUsers(); loadSession(); render();
    if(document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initParticles);
    } else {
        setTimeout(initParticles, 100);
    }
})();
</script>
</body>
</html>
